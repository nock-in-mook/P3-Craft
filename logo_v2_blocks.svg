<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120">
  <!-- パターン2: 重なる角丸ブロック -->
  <defs>
    <style>
      .logo-text { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>
  <!-- 緑ブロック -->
  <rect x="10" y="20" width="65" height="65" rx="14" fill="#27ae60" opacity="0.9"/>
  <!-- オレンジブロック（重なり） -->
  <rect x="45" y="35" width="65" height="65" rx="14" fill="#f39c12" opacity="0.8"/>
  <!-- P3 -->
  <text x="38" y="58" class="logo-text" font-size="28" fill="white" text-anchor="middle">P</text>
  <text x="82" y="80" class="logo-text" font-size="28" fill="white" text-anchor="middle">3</text>
  <!-- Craft -->
  <text x="135" y="75" font-family="'Segoe UI', Arial, sans-serif" font-weight="300" font-size="40" fill="#2c3e50" letter-spacing="6">Craft</text>
</svg>
