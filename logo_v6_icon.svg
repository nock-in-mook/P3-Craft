<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- V6: 正方形アイコン - 重なるブロック -->
  <rect width="200" height="200" rx="32" fill="#fafafa"/>
  <!-- 緑ブロック -->
  <rect x="42" y="25" width="72" height="72" rx="16" fill="#27ae60" opacity="0.9"/>
  <!-- オレンジブロック（重なり） -->
  <rect x="86" y="45" width="72" height="72" rx="16" fill="#f39c12" opacity="0.8"/>
  <!-- P3 -->
  <text x="72" y="68" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle">P</text>
  <text x="128" y="92" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="28" fill="white" text-anchor="middle">3</text>
  <!-- Craft -->
  <text x="100" y="160" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="38" fill="#2c3e50" text-anchor="middle" letter-spacing="4">Craft</text>
</svg>
